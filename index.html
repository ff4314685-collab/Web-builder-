<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Website Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* CRITICAL FIX 3: Mobile View (100dvh) */
        body {
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin: 0;
            background-color: #f3f4f6; /* bg-gray-100 */
        }

        /* Sidebar transition for mobile (optional enhancement for responsiveness) */
        @media (max-width: 768px) {
            #sidebar {
                position: absolute;
                z-index: 40;
                height: 100%;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }
            #sidebar.open {
                transform: translateX(0);
            }
        }
        
        /* Loading spinner */
        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 3px solid white;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="flex flex-1 w-full h-full overflow-hidden relative">
        
        <aside id="sidebar" class="w-64 bg-gray-900 text-white flex flex-col flex-shrink-0">
            <div class="p-4 border-b border-gray-700">
                <button onclick="createNewProject()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition-colors flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    New Project
                </button>
            </div>
            
            <div class="flex-1 overflow-y-auto p-2" id="projectList">
                </div>
            
            <div class="p-4 border-t border-gray-700">
                <button onclick="toggleSettings(true)" class="w-full text-gray-400 hover:text-white flex items-center gap-2 px-2 py-2 rounded hover:bg-gray-800 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    Settings
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col bg-white overflow-hidden w-full relative">
            
            <header class="h-14 border-b flex items-center justify-between px-4 bg-gray-50 flex-shrink-0">
                <div class="flex items-center gap-2">
                    <button class="md:hidden mr-2 text-gray-600" onclick="document.getElementById('sidebar').classList.toggle('open')">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                    <div class="flex gap-1.5">
                        <div class="w-3 h-3 rounded-full bg-red-500"></div>
                        <div class="w-3 h-3 rounded-full bg-yellow-400"></div>
                        <div class="w-3 h-3 rounded-full bg-green-500"></div>
                    </div>
                </div>

                <div class="flex bg-gray-200 p-1 rounded-md">
                    <button id="btnPreview" onclick="switchView('preview')" class="px-4 py-1 rounded text-sm font-medium bg-white shadow-sm text-gray-800 transition-all">Preview</button>
                    <button id="btnCode" onclick="switchView('code')" class="px-4 py-1 rounded text-sm font-medium text-gray-500 hover:text-gray-800 transition-all">Code</button>
                </div>

                <button onclick="downloadHtml()" class="flex items-center gap-1 text-sm font-medium text-gray-600 hover:text-blue-600 transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    <span class="hidden sm:inline">Download</span>
                </button>
            </header>

            <div class="flex-1 overflow-hidden relative bg-gray-50">
                <iframe id="previewFrame" class="w-full h-full border-0 absolute inset-0 bg-white" sandbox="allow-scripts allow-modals allow-forms allow-popups"></iframe>
                
                <div id="codeView" class="w-full h-full absolute inset-0 hidden bg-gray-900 overflow-auto p-4">
                    <pre><code id="codeBlock" class="text-green-400 font-mono text-sm leading-relaxed"></code></pre>
                </div>
            </div>

            <footer class="border-t p-3 bg-white flex-shrink-0 flex gap-2">
                <textarea id="promptInput" rows="1" class="flex-1 border rounded-lg px-3 py-2 resize-none focus:outline-none focus:ring-2 focus:ring-blue-500 max-h-32 min-h-[44px]" placeholder="Describe your website or updates... (Press Enter to send)" oninput="this.style.height = '';this.style.height = this.scrollHeight + 'px'"></textarea>
                <button id="sendBtn" onclick="generateWebsite()" class="bg-blue-600 hover:bg-blue-700 text-white rounded-lg px-4 py-2 font-medium flex items-center justify-center transition-colors h-[44px]">
                    <span id="sendIcon"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg></span>
                    <div id="loadingIcon" class="spinner hidden"></div>
                </button>
            </footer>

        </main>
        
        <div id="sidebarOverlay" class="fixed inset-0 bg-black bg-opacity-50 z-30 hidden md:hidden" onclick="document.getElementById('sidebar').classList.remove('open')"></div>
    </div>

    <div id="settingsModal" class="fixed inset-0 bg-black bg-opacity-60 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md flex flex-col overflow-hidden">
            <div class="p-4 border-b flex justify-between items-center bg-gray-50">
                <h2 class="text-lg font-bold text-gray-800">Configuration</h2>
                <button onclick="toggleSettings(false)" class="text-gray-500 hover:text-gray-800">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-6 flex flex-col gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">API URL</label>
                    <input type="text" id="cfgApiUrl" class="w-full border rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none font-mono text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">API Key</label>
                    <input type="password" id="cfgApiKey" class="w-full border rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none font-mono text-sm" placeholder="sk-or-v1-...">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Model ID</label>
                    <input type="text" id="cfgModelId" class="w-full border rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none font-mono text-sm">
                </div>
            </div>
            <div class="p-4 border-t bg-gray-50 flex justify-end gap-2">
                <button onclick="toggleSettings(false)" class="px-4 py-2 border rounded text-gray-700 hover:bg-gray-100 transition-colors">Cancel</button>
                <button onclick="saveSettings()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded transition-colors font-medium">Save Settings</button>
            </div>
        </div>
    </div>

    <script>
        /** * SYSTEM LOGIC 
         */
        const SYSTEM_PROMPT = "You are a web developer. Output ONLY raw HTML code. Do not wrap in markdown tags like ```html or ```. Provide the complete HTML file code starting with <!DOCTYPE html>. Include all CSS and JS inline. Do not include any conversational text.";
        
        const DEFAULT_SETTINGS = {
            apiUrl: "https://openrouter.ai/api/v1/chat/completions",
            apiKey: "",
            modelId: "deepseek/deepseek-r1:free"
        };

        let state = {
            settings: { ...DEFAULT_SETTINGS },
            projects: [],
            activeProjectId: null
        };

        // Initialize App
        function init() {
            loadState();
            if (state.projects.length === 0) {
                createNewProject();
            } else if (!state.activeProjectId) {
                switchProject(state.projects[0].id);
            } else {
                renderProjectList();
                renderActiveProject();
            }

            // Keyboard shortcut for chat
            document.getElementById('promptInput').addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    generateWebsite();
                }
            });

            // Mobile sidebar hook
            const observer = new MutationObserver((mutations) => {
                mutations.forEach((mutation) => {
                    if (mutation.target.classList.contains('open')) {
                        document.getElementById('sidebarOverlay').classList.remove('hidden');
                    } else {
                        document.getElementById('sidebarOverlay').classList.add('hidden');
                    }
                });
            });
            observer.observe(document.getElementById('sidebar'), { attributes: true, attributeFilter: ['class'] });
        }

        // --- State Management ---
        function loadState() {
            const saved = localStorage.getItem('aiWebBuilderState');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    state = { ...state, ...parsed };
                    // Ensure critical defaults are present if missing
                    if (!state.settings.apiUrl) state.settings.apiUrl = DEFAULT_SETTINGS.apiUrl;
                    if (!state.settings.modelId) state.settings.modelId = DEFAULT_SETTINGS.modelId;
                } catch (e) {
                    console.error("Failed to parse state", e);
                }
            }
        }

        function saveState() {
            localStorage.setItem('aiWebBuilderState', JSON.stringify(state));
        }

        // --- Projects ---
        function createNewProject() {
            const newProject = {
                id: Date.now().toString(),
                name: `Project ${state.projects.length + 1}`,
                messages: [],
                code: "\n<div style='display:flex; height:100vh; align-items:center; justify-content:center; font-family:sans-serif; color:#666;'><h1>Preview will appear here</h1></div>"
            };
            state.projects.unshift(newProject);
            switchProject(newProject.id);
            
            // Close mobile sidebar if open
            document.getElementById('sidebar').classList.remove('open');
        }

        function switchProject(id) {
            state.activeProjectId = id;
            renderProjectList();
            renderActiveProject();
            saveState();
            
            // Close mobile sidebar
            document.getElementById('sidebar').classList.remove('open');
        }

        function getActiveProject() {
            return state.projects.find(p => p.id === state.activeProjectId);
        }

        function renderProjectList() {
            const listEl = document.getElementById('projectList');
            listEl.innerHTML = '';
            
            state.projects.forEach(project => {
                const isActive = project.id === state.activeProjectId;
                const btn = document.createElement('button');
                btn.className = `w-full text-left px-3 py-2 rounded mb-1 truncate text-sm transition-colors ${isActive ? 'bg-blue-600 text-white font-medium' : 'text-gray-300 hover:bg-gray-800 hover:text-white'}`;
                btn.textContent = project.name;
                btn.onclick = () => switchProject(project.id);
                listEl.appendChild(btn);
            });
        }

        function renderActiveProject() {
            const project = getActiveProject();
            if (!project) return;
            
            updateEditors(project.code);
        }

        // --- Views & UI ---
        function switchView(view) {
            const btnPreview = document.getElementById('btnPreview');
            const btnCode = document.getElementById('btnCode');
            const previewFrame = document.getElementById('previewFrame');
            const codeView = document.getElementById('codeView');

            if (view === 'preview') {
                btnPreview.className = "px-4 py-1 rounded text-sm font-medium bg-white shadow-sm text-gray-800 transition-all";
                btnCode.className = "px-4 py-1 rounded text-sm font-medium text-gray-500 hover:text-gray-800 transition-all";
                previewFrame.style.display = 'block';
                codeView.style.display = 'none';
            } else {
                btnCode.className = "px-4 py-1 rounded text-sm font-medium bg-white shadow-sm text-gray-800 transition-all";
                btnPreview.className = "px-4 py-1 rounded text-sm font-medium text-gray-500 hover:text-gray-800 transition-all";
                previewFrame.style.display = 'none';
                codeView.style.display = 'block';
            }
        }

        function updateEditors(codeHtml) {
            // Clean markdown blocks just in case LLM disobeys SYSTEM_PROMPT
            let cleanCode = codeHtml.replace(/^```(html|xml)?\n/i, '').replace(/\n```$/i, '').trim();
            
            document.getElementById('previewFrame').srcdoc = cleanCode;
            document.getElementById('codeBlock').textContent = cleanCode;
        }

        function toggleLoading(isLoading) {
            const input = document.getElementById('promptInput');
            const btn = document.getElementById('sendBtn');
            const icon = document.getElementById('sendIcon');
            const spinner = document.getElementById('loadingIcon');

            input.disabled = isLoading;
            btn.disabled = isLoading;
            
            if (isLoading) {
                icon.classList.add('hidden');
                spinner.classList.remove('hidden');
                btn.classList.replace('bg-blue-600', 'bg-gray-400');
            } else {
                icon.classList.remove('hidden');
                spinner.classList.add('hidden');
                btn.classList.replace('bg-gray-400', 'bg-blue-600');
                input.focus();
            }
        }

        // --- API & Generation Logic ---
        async function generateWebsite() {
            const inputEl = document.getElementById('promptInput');
            const promptText = inputEl.value.trim();
            
            if (!promptText) return;
            if (!state.settings.apiKey) {
                alert("Please set your API Key in Settings first.");
                toggleSettings(true);
                return;
            }

            const project = getActiveProject();
            
            // Add user message to history
            project.messages.push({ role: "user", content: promptText });
            if (project.messages.length === 1) {
                project.name = promptText.substring(0, 20) + "...";
                renderProjectList();
            }

            inputEl.value = "";
            inputEl.style.height = '44px'; // Reset height
            toggleLoading(true);

            try {
                // Prepare API Payload
                const payload = {
                    model: state.settings.modelId,
                    messages: [
                        { role: "system", content: SYSTEM_PROMPT },
                        ...project.messages
                    ]
                };

                const response = await fetch(state.settings.apiUrl, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${state.settings.apiKey}`
                    },
                    body: JSON.stringify(payload)
                });

                // CRITICAL FIX 2: Anti-Crash JSON Logic
                const text = await response.text();
                if (!response.ok) {
                    alert("API Error: " + text);
                    toggleLoading(false);
                    return; // STOP EXECUTION
                }
                
                const data = JSON.parse(text);
                const generatedHTML = data.choices[0].message.content;

                // Save to state
                project.messages.push({ role: "assistant", content: generatedHTML });
                project.code = generatedHTML;
                
                updateEditors(project.code);
                saveState();
                
                // Ensure preview view is active after generation
                switchView('preview');

            } catch (error) {
                console.error(error);
                alert("Network or Parsing Error: " + error.message);
                // Rollback last user message on fail
                project.messages.pop(); 
            } finally {
                toggleLoading(false);
            }
        }

        // --- Settings Modal ---
        function toggleSettings(show) {
            const modal = document.getElementById('settingsModal');
            if (show) {
                document.getElementById('cfgApiUrl').value = state.settings.apiUrl;
                document.getElementById('cfgApiKey').value = state.settings.apiKey;
                document.getElementById('cfgModelId').value = state.settings.modelId;
                modal.classList.remove('hidden');
            } else {
                modal.classList.add('hidden');
            }
        }

        function saveSettings() {
            const urlVal = document.getElementById('cfgApiUrl').value.trim();
            state.settings.apiUrl = urlVal || DEFAULT_SETTINGS.apiUrl; // Fallback to OpenRouter if empty
            state.settings.apiKey = document.getElementById('cfgApiKey').value.trim();
            state.settings.modelId =
